; PlatformIO Project Configuration - STM32F407VET6 Chassis Controller
;
; Build:
;   pio run
;
; Flash over USB cable:
;   pio run -t upload
;
; Monitor on the PC-side UART bridge:
;   pio device monitor -p COM5 -b 115200
;
; Notes:
; - This project keeps the existing Cube-generated Core/ tree in place.
; - The prebuilt micro-ROS static library must exist at micro_ros_lib/libmicroros.a.
; - This configuration assumes USB DFU flashing over the board's USB cable.

[platformio]
default_envs = stm32f407vet6
src_dir = Core
include_dir = Core/Inc

[env]
build_src_filter =
    +<Src/*.c>
    +<Startup/*.s>

[env:stm32f407vet6]
platform = ststm32
board = genericSTM32F407VET6
framework = stm32cube

upload_protocol = dfu
upload_port = 0483:df11
monitor_port = COM5
monitor_speed = 115200

board_build.ldscript = Core/STM32F407VGTx_FLASH.ld
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F407xx
    -I Drivers/STM32F4xx_HAL_Driver/Inc
    -I Drivers/STM32F4xx_HAL_Driver/Inc/Legacy
    -I Drivers/CMSIS/Device/ST/STM32F4xx/Include
    -I Drivers/CMSIS/Include
    -I micro_ros_lib/include
    -L micro_ros_lib
    -lmicroros
    -Wl,--gc-sections
    -Wl,--print-memory-usage

lib_ldf_mode = chain+
