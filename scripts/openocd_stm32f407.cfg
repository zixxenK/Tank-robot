# OpenOCD configuration for STM32F407VGTx
# Source: Rock64 Ranger project
#
# This configuration is for flashing STM32F407VGTx using ST-Link
# via SWD (Serial Wire Debug) interface.
#
# Usage:
#   openocd -f scripts/openocd_stm32f407.cfg -c "program firmware/stm32_chassis/build/rock64_ranger_fw.elf verify reset exit"

# Interface configuration (ST-Link)
source [find interface/stlink.cfg]

# Transport selection
transport select hla_swd

# Target configuration (STM32F4 series)
source [find target/stm32f4x.cfg]

# Set target frequency to 2MHz for stability
adapter speed 2000

# Reset configuration
reset_config srst_only
